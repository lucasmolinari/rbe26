worker_processes 1;

events {
  worker_connections 4096;
}

http {
  upstream api {
    server api1:9999;
    server api2:9999;
    keepalive 256;
  }

  server {
    listen 9999;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 1s;
      proxy_send_timeout 2s;
      proxy_read_timeout 2s;
      proxy_pass http://api;
    }
  }
}
