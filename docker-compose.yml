services:
  api1:
    build:
      context: .
      target: api
    environment:
      - VECTORS_PATH=/app/resources/vectors.bin
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "165MB"
  api2:
    build:
      context: .
      target: api
    environment:
      - VECTORS_PATH=/app/resources/vectors.bin
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "165MB"
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "20MB"
